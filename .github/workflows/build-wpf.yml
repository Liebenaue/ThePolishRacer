name: Build WPF App

on:
  push:
    branches: [ PolishRacer ]
  pull_request:
    branches: [ PolishRacer ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSBuild path
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore WpfApp1.sln

    - name: Build solution
      run: msbuild WpfApp1.sln /p:Configuration=Release
